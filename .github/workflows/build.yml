name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir -p public
          cp dist/index.html public/management.html

      - name: Commit build result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/management.html

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto build management.html"
            git push
          fi
